# Canonical deploy config lives at ../../render.yaml. This package-level copy
# mirrors the important Irene env surface so it is not a stale footgun.
services:
  - type: web
    name: irene-bot
    runtime: node
    plan: standard
    buildCommand: npm ci
    startCommand: npm run start:irene
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: AI_PROVIDER
        value: openrouter
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_API_KEYS
        sync: false
      - key: OPENAI_COMPAT_MODEL
        value: openrouter/owl-alpha
      - key: OPENAI_COMPAT_FAST_MODEL
        value: openrouter/owl-alpha
      - key: OPENAI_COMPAT_MAX_TOKENS
        value: "8192"
      - key: OPENAI_COMPAT_TEMPERATURE
        value: "0.9"
      - key: OPENAI_COMPAT_TOP_P
        value: "1.0"
      - key: OPENAI_COMPAT_TOOL_CHOICE
        value: none
      - key: OPENAI_COMPAT_PROVIDER_NAME
        value: OpenRouter
      - key: OPENAI_COMPAT_HTTP_REFERER
        value: https://irene-bot.onrender.com
      - key: OPENAI_COMPAT_APP_TITLE
        value: Irene Discord Bot
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: REQUIRE_PERSISTENCE
        value: "1"
      - key: TWIN_API_SECRET
        sync: false
      - key: DASHBOARD_API_KEY
        sync: false
