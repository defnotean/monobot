services:
  - type: web
    name: eris-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: AI_PROVIDER
        value: openrouter
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENAI_COMPAT_MODEL
        value: openai/gpt-oss-120b:free
      - key: OPENAI_COMPAT_FAST_MODEL
        value: openai/gpt-oss-120b:free
      - key: OPENAI_COMPAT_PROVIDER_NAME
        value: OpenRouter
      - key: OPENAI_COMPAT_HTTP_REFERER
        value: https://eris-bot.onrender.com
      - key: OPENAI_COMPAT_APP_TITLE
        value: OpenClaw Eris
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: KLIPY_API_KEY
        sync: false
      - key: BOT_OWNER_ID
        sync: false
