# Canonical deploy config lives at ../../render.yaml. This package-level copy
# mirrors the important Eris env surface so it is not a stale footgun.
services:
  - type: web
    name: eris-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm run start:eris
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DISCORD_TOKEN
        sync: false
      - key: CLIENT_ID
        sync: false
      - key: AI_PROVIDER
        value: kimi
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_BASE_URL
        value: https://integrate.api.nvidia.com/v1
      - key: NVIDIA_MODEL
        value: moonshotai/kimi-k2.6
      - key: NVIDIA_FAST_MODEL
        value: moonshotai/kimi-k2.6
      - key: NVIDIA_MAX_TOKENS
        value: "16384"
      - key: NVIDIA_TEMPERATURE
        value: "1.0"
      - key: NVIDIA_TOP_P
        value: "1.0"
      - key: NVIDIA_THINKING
        value: "true"
      - key: NVIDIA_TOOL_STRICTNESS
        value: balanced
      - key: TIMEOUT_WORKER
        value: "120000"
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_API_KEYS
        sync: false
      - key: OPENAI_COMPAT_MODEL
        value: openai/gpt-oss-120b:free
      - key: OPENAI_COMPAT_FAST_MODEL
        value: openai/gpt-oss-120b:free
      - key: OPENAI_COMPAT_PROVIDER_NAME
        value: OpenRouter
      - key: OPENAI_COMPAT_HTTP_REFERER
        value: https://eris-bot.onrender.com
      - key: OPENAI_COMPAT_APP_TITLE
        value: OpenClaw Eris
      - key: GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: REQUIRE_PERSISTENCE
        value: "1"
      - key: TWIN_API_SECRET
        sync: false
      - key: DASHBOARD_API_KEY
        sync: false
      - key: PC_AGENT_DISABLED
        value: "1"
      - key: KLIPY_API_KEY
        sync: false
      - key: BOT_OWNER_ID
        sync: false
